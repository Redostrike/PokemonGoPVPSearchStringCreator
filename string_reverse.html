<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #0f172a;
  --bg-tertiary: #1a2332;
  --bg-hover: #1e293b;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #d4a843;
  --accent-hover: #e2b84c;
  --accent-dim: #a07820;
  --border: #1e293b;
  --border-light: #2d3a50;
  --radius: 8px;
  --radius-sm: 4px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-hover)}
.header{height:56px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg-secondary);gap:12px}
.header-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.05rem}
.header-logo svg{color:var(--accent);flex-shrink:0}
.container{flex:1;max-width:700px;width:100%;margin:0 auto;padding:24px 16px}
h1{font-size:1.3rem;margin-bottom:4px}
p.sub{font-size:0.85rem;color:var(--text-secondary);margin-bottom:20px}
textarea{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-light);background:var(--bg-primary);color:var(--text-primary);font-size:0.9rem;font-family:var(--font);resize:vertical;outline:none;transition:border .15s}
textarea:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:6px;height:44px;padding:0 20px;border:none;border-radius:var(--radius);font-size:0.9rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}
.btn-primary{background:var(--accent);color:#0a0e1a}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-light)}
.btn-secondary:hover{background:var(--bg-hover);border-color:var(--accent)}
.result{margin-top:16px;display:none;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-secondary)}
.result-header{display:grid;grid-template-columns:52px 1fr;gap:8px;padding:10px 12px;background:var(--bg-tertiary);border-bottom:1px solid var(--border);font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;position:sticky;top:0}
.result-list{padding:4px 0}
.result-item{display:grid;grid-template-columns:52px 1fr;gap:8px;align-items:center;padding:8px 12px;font-size:0.9rem;transition:background .1s}
.result-item:nth-child(even){background:rgba(255,255,255,0.02)}
.result-item:hover{background:var(--bg-hover)}
.result-dex{color:var(--text-muted);text-align:right;font-feature-settings:"tnum";font-size:0.8rem}
.result-name{color:var(--text-primary);font-weight:500}
.result-count{font-size:0.85rem;color:var(--text-secondary);padding:10px 12px;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.result-count strong{color:var(--accent)}
.result-unknown{font-size:0.8rem;color:var(--text-muted);padding:8px 12px;border-top:1px solid var(--border);background:var(--bg-secondary)}
.empty{font-size:0.85rem;color:var(--text-muted);padding:24px 0;text-align:center}
.footer{border-top:1px solid var(--border);padding:16px;text-align:center;font-size:0.75rem;color:var(--text-muted);line-height:1.6}
@media(max-width:480px){.container{padding:16px 12px}}
</style>
</head>

function buildLookup() {
  let map = {};
  try {
    const raw = localStorage.getItem('pvpsearch_dex_names');
    if (raw) map = JSON.parse(raw);
  } catch(e) {}
  for (const dex of Object.keys(DEX_NAMES)) {
    if (!map[dex]) map[dex] = DEX_NAMES[dex];
  }
  return map;
}

function check() {
  const input = document.getElementById('checkerInput').value.trim();
  const container = document.getElementById('result');
  if (!input) { container.style.display = 'none'; return; }
  const nums = (input.match(/\d+/g) || []).map(Number);
  if (nums.length === 0) {
    container.innerHTML = '<div class="empty">No numbers found.</div>';
    container.style.display = 'block';
    return;
  }
  const lookup = buildLookup();
  const found = [];
  const unknown = [];
  for (const n of nums) {
    const name = lookup[n];
    if (name) found.push({ dex: n, name });
    else unknown.push(n);
  }
  let html = '<div class="result-count">Found <strong>' + found.length + '</strong> Pok\u00e9mon' +
    (unknown.length > 0 ? ' (<strong>' + unknown.length + '</strong> unknown)' : '') + '</div>';
  if (found.length > 0) {
    html += '<div class="result-header"><span>Dex</span><span>Pok\u00e9mon</span></div>';
    html += '<div class="result-list">' + found.map(e =>
      '<div class="result-item"><span class="result-dex">#' + e.dex + '</span><span class="result-name">' + e.name + '</span></div>'
    ).join('') + '</div>';
  }
  if (unknown.length > 0) {
    html += '<div class="result-unknown">Unknown Dex numbers: ' + unknown.join(', ') + '</div>';
  }
  container.innerHTML = html;
  container.style.display = 'block';
}

document.getElementById('checkerInput').addEventListener('input', check);
